name: skillgraph_mvp

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skillgraph}
      POSTGRES_USER: ${POSTGRES_USER:-skillgraph}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillgraph}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://skillgraph:skillgraph@postgres:5432/skillgraph}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_me}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_EXPIRES_MINUTES: ${JWT_ACCESS_EXPIRES_MINUTES:-20}
      JWT_REFRESH_EXPIRES_MINUTES: ${JWT_REFRESH_EXPIRES_MINUTES:-10080}
      FRONTEND_ADMIN_URL: ${FRONTEND_ADMIN_URL:-http://localhost:5173}
      FRONTEND_WEB_URL: ${FRONTEND_WEB_URL:-http://localhost:5174}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-analysis:8100}
      AI_QUESTION_SERVICE_URL: ${AI_QUESTION_SERVICE_URL:-http://ai-question:8100}
      AI_TTS_SERVICE_URL: ${AI_TTS_SERVICE_URL:-http://ai-tts:8100}
      AI_STT_SERVICE_URL: ${AI_STT_SERVICE_URL:-http://ai-stt:8100}
      AI_ANALYSIS_SERVICE_URL: ${AI_ANALYSIS_SERVICE_URL:-http://ai-analysis:8100}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-superadmin@skillgraph.dev}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-SkillGraphAdmin123!}
      SUPERADMIN_COMPANY: ${SUPERADMIN_COMPANY:-SkillGraph Platform}
    depends_on:
      - postgres
      - ai-question
      - ai-tts
      - ai-stt
      - ai-analysis
    ports:
      - "8000:8000"

  ai-question:
    image: skillgraph_mvp-ai:latest
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      HF_HOME: ${HF_HOME:-/models}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_LLM_MODEL: ${HF_LLM_MODEL:-distilgpt2}
      HF_EMBEDDING_MODEL: ${HF_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      HF_SENTIMENT_MODEL: ${HF_SENTIMENT_MODEL:-distilbert/distilbert-base-uncased-finetuned-sst-2-english}
      HF_STT_MODEL: ${HF_STT_MODEL:-openai/whisper-tiny}
      HF_TTS_MODEL: ${HF_TTS_MODEL:-microsoft/speecht5_tts}
      HF_TTS_VOCODER: ${HF_TTS_VOCODER:-microsoft/speecht5_hifigan}
      AI_SERVICE_MODE: question
      AI_SERVICE_NAME: ai-question
    volumes:
      - model_data:/models
    ports:
      - "8101:8100"

  ai-tts:
    image: skillgraph_mvp-ai:latest
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      HF_HOME: ${HF_HOME:-/models}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_LLM_MODEL: ${HF_LLM_MODEL:-distilgpt2}
      HF_EMBEDDING_MODEL: ${HF_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      HF_SENTIMENT_MODEL: ${HF_SENTIMENT_MODEL:-distilbert/distilbert-base-uncased-finetuned-sst-2-english}
      HF_STT_MODEL: ${HF_STT_MODEL:-openai/whisper-tiny}
      HF_TTS_MODEL: ${HF_TTS_MODEL:-microsoft/speecht5_tts}
      HF_TTS_VOCODER: ${HF_TTS_VOCODER:-microsoft/speecht5_hifigan}
      AI_SERVICE_MODE: tts
      AI_SERVICE_NAME: ai-tts
    volumes:
      - model_data:/models
    ports:
      - "8102:8100"

  ai-stt:
    image: skillgraph_mvp-ai:latest
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      HF_HOME: ${HF_HOME:-/models}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_LLM_MODEL: ${HF_LLM_MODEL:-distilgpt2}
      HF_EMBEDDING_MODEL: ${HF_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      HF_SENTIMENT_MODEL: ${HF_SENTIMENT_MODEL:-distilbert/distilbert-base-uncased-finetuned-sst-2-english}
      HF_STT_MODEL: ${HF_STT_MODEL:-openai/whisper-tiny}
      HF_TTS_MODEL: ${HF_TTS_MODEL:-microsoft/speecht5_tts}
      HF_TTS_VOCODER: ${HF_TTS_VOCODER:-microsoft/speecht5_hifigan}
      AI_SERVICE_MODE: stt
      AI_SERVICE_NAME: ai-stt
    volumes:
      - model_data:/models
    ports:
      - "8103:8100"

  ai-analysis:
    image: skillgraph_mvp-ai:latest
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      HF_HOME: ${HF_HOME:-/models}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_LLM_MODEL: ${HF_LLM_MODEL:-distilgpt2}
      HF_EMBEDDING_MODEL: ${HF_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      HF_SENTIMENT_MODEL: ${HF_SENTIMENT_MODEL:-distilbert/distilbert-base-uncased-finetuned-sst-2-english}
      HF_STT_MODEL: ${HF_STT_MODEL:-openai/whisper-tiny}
      HF_TTS_MODEL: ${HF_TTS_MODEL:-microsoft/speecht5_tts}
      HF_TTS_VOCODER: ${HF_TTS_VOCODER:-microsoft/speecht5_hifigan}
      AI_SERVICE_MODE: analysis
      AI_SERVICE_NAME: ai-analysis
    volumes:
      - model_data:/models
    ports:
      - "8104:8100"

  admin:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.admin
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api}
    depends_on:
      - api
    ports:
      - "5173:5173"

  web:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.web
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-http://localhost:8000/api}
    depends_on:
      - api
    ports:
      - "5174:5174"

volumes:
  postgres_data:
  model_data:
